<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stores — TIBY Hair Perfume</title>
  <meta name="description" content="全国のドン・キホーテ 219店舗で展開中のTIBY ヘアパフューム。店舗を地域から探す。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@200;300;400&family=Zen+Maru+Gothic:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --off-black: #111111;
      --dark: #161616;
      --love: #F4A0A0;
      --hug: #7EC8B5;
      --kiss: #A78BBF;
      --white: #f5f0ee;
      --white-dim: rgba(245,240,238,0.5);
      --white-faint: rgba(245,240,238,0.07);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--white-faint);
    }
    .nav-logo img { height: 28px; width: auto; filter: brightness(10); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--white-dim);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }

    /* HERO */
    .page-hero {
      padding: 160px 48px 80px;
      text-align: center;
      position: relative;
      background:
        radial-gradient(ellipse 60% 50% at 30% 60%, rgba(244,160,160,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 75% 30%, rgba(167,139,191,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 100%, rgba(126,200,181,0.04) 0%, transparent 60%);
    }
    .page-label {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--white-dim);
      margin-bottom: 24px;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(32px, 5vw, 64px);
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .page-title em {
      font-style: normal;
      background: linear-gradient(135deg, var(--love) 0%, var(--kiss) 50%, var(--hug) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-sub {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 13px;
      color: var(--white-dim);
      line-height: 2;
      max-width: 600px;
      margin: 0 auto;
    }
    .stat-count {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 36px;
      font-family: 'Cormorant Garamond', serif;
    }
    .stat-count .num {
      font-size: 64px;
      font-weight: 300;
      line-height: 1;
      background: linear-gradient(135deg, var(--love) 0%, var(--kiss) 50%, var(--hug) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-count .unit {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white-dim);
    }

    /* CONTROLS */
    .controls {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 48px 0;
    }
    .search-wrap {
      position: relative;
      margin-bottom: 32px;
    }
    .search-input {
      width: 100%;
      padding: 18px 24px 18px 52px;
      background: var(--off-black);
      border: 1px solid var(--white-faint);
      color: var(--white);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
      border-radius: 0;
      outline: none;
      transition: border-color 0.3s;
    }
    .search-input:focus { border-color: rgba(245,240,238,0.3); }
    .search-input::placeholder { color: rgba(245,240,238,0.3); }
    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--white-dim);
      font-size: 16px;
      pointer-events: none;
    }

    .region-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      margin-bottom: 48px;
      border-bottom: 1px solid var(--white-faint);
    }
    .region-tab {
      flex: 1 1 auto;
      min-width: 80px;
      padding: 16px 12px;
      background: transparent;
      border: none;
      color: var(--white-dim);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.3s, background 0.3s;
      position: relative;
    }
    .region-tab:hover { color: var(--white); background: var(--white-faint); }
    .region-tab.active { color: var(--white); }
    .region-tab.active::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -1px;
      height: 1px;
      background: var(--white);
    }
    .region-tab .count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px;
      margin-left: 6px;
      opacity: 0.6;
    }

    /* STORES LIST */
    .stores-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px 120px;
    }
    .region-group { margin-bottom: 56px; }
    .region-group:last-child { margin-bottom: 0; }
    .region-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--white-faint);
    }
    .region-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 28px;
      letter-spacing: 2px;
    }
    .region-count {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--white-dim);
    }

    .stores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
    }
    .store-card {
      background: var(--off-black);
      padding: 24px 28px;
      transition: background 0.3s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .store-card:hover { background: var(--dark); }
    .store-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(245,240,238,0.35);
      text-transform: uppercase;
    }
    .store-name {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--white);
      font-weight: 400;
    }
    .store-sub {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white-dim);
    }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--white-dim);
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 13px;
      line-height: 2;
    }

    /* CTA */
    .cta-section {
      padding: 100px 48px;
      background: var(--off-black);
      text-align: center;
      border-top: 1px solid var(--white-faint);
    }
    .cta-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(24px, 3vw, 36px);
      margin-bottom: 16px;
      font-weight: 300;
    }
    .cta-sub {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 12px;
      color: var(--white-dim);
      line-height: 2;
      margin-bottom: 40px;
    }
    .cta-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      border: 1px solid rgba(245,240,238,0.2);
      color: var(--white);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      transition: border-color 0.3s, background 0.3s;
    }
    .cta-btn:hover { border-color: rgba(245,240,238,0.5); background: var(--white-faint); }

    /* FOOTER */
    footer {
      padding: 64px 48px 40px;
      background: var(--black);
      border-top: 1px solid var(--white-faint);
    }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 24px;
    }
    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 6px;
    }
    .footer-copy {
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(245,240,238,0.3);
    }
    .footer-nav { display: flex; gap: 24px; }
    .footer-nav a {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white-dim);
      text-decoration: none;
      transition: color 0.3s;
    }
    .footer-nav a:hover { color: var(--white); }

    /* MOBILE */
    @media (max-width: 768px) {
      nav { padding: 20px 20px; }
      .nav-links { gap: 16px; }
      .nav-links a { font-size: 10px; letter-spacing: 1.5px; }
      .page-hero { padding: 120px 20px 60px; }
      .controls, .stores-section { padding-left: 20px; padding-right: 20px; }
      .region-tabs { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
      .region-tab { flex: 0 0 auto; min-width: 100px; white-space: nowrap; }
      .stores-grid { grid-template-columns: 1fr; }
      .cta-section { padding: 64px 20px; }
      footer { padding: 48px 20px 32px; }
    }
  </style>
</head>

  <script>
    (function() {
      const stores = JSON.parse(document.getElementById('storesData').textContent);
      const REGION_ORDER = ['北海道','東北','関東','中部','関西','中国・四国','九州・沖縄'];

      // Counts
      const countsByRegion = stores.reduce((acc, s) => {
        acc[s.region] = (acc[s.region] || 0) + 1;
        return acc;
      }, {});
      document.getElementById('count-all').textContent = stores.length;
      REGION_ORDER.forEach(r => {
        const el = document.getElementById('count-' + r);
        if (el) el.textContent = countsByRegion[r] || 0;
      });
      document.getElementById('totalCount').textContent = stores.length;

      // Render
      const container = document.getElementById('storesContainer');
      let currentRegion = 'all';
      let currentQuery = '';

      function render() {
        const q = currentQuery.trim().toLowerCase();
        const filtered = stores.filter(s => {
          if (currentRegion !== 'all' && s.region !== currentRegion) return false;
          if (!q) return true;
          return [s.name, s.name_display, s.sub_area, s.region, String(s.code)]
            .some(v => String(v).toLowerCase().includes(q));
        });

        if (filtered.length === 0) {
          container.innerHTML = '<div class="empty-state">該当する店舗が見つかりませんでした。<br>検索条件を変えてお試しください。</div>';
          return;
        }

        // Group by region
        const grouped = {};
        filtered.forEach(s => {
          if (!grouped[s.region]) grouped[s.region] = [];
          grouped[s.region].push(s);
        });

        const html = REGION_ORDER
          .filter(r => grouped[r])
          .map(r => {
            const cards = grouped[r]
              .sort((a, b) => a.code - b.code)
              .map(s => `
                <div class="store-card">
                  <span class="store-code">No. ${s.code}</span>
                  <span class="store-name">${escapeHtml(s.name_display || s.name)}</span>
                  <span class="store-sub">${escapeHtml(s.sub_area || '')} エリア</span>
                </div>
              `).join('');
            return `
              <div class="region-group">
                <div class="region-header">
                  <span class="region-name">${r}</span>
                  <span class="region-count">${grouped[r].length} 店舗</span>
                </div>
                <div class="stores-grid">${cards}</div>
              </div>
            `;
          }).join('');

        container.innerHTML = html;
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        }[c]));
      }

      // Events
      document.getElementById('regionTabs').addEventListener('click', (e) => {
        const btn = e.target.closest('.region-tab');
        if (!btn) return;
        document.querySelectorAll('.region-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRegion = btn.dataset.region;
        render();
      });

      const searchInput = document.getElementById('searchInput');
      let debounceTimer;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          currentQuery = e.target.value;
          render();
        }, 120);
      });

      render();
    })();
  </script>
